<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Médicaments — FieldScreen AI</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <style>
    .med-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: var(--spacing-md);
      margin-top: var(--spacing-md);
    }
    .med-card {
      border-left: 4px solid var(--color-secondary);
    }
    .med-card.low {
      border-left-color: var(--color-danger);
    }
    .med-card.warning {
      border-left-color: var(--color-warning);
    }
    .med-name {
      font-weight: 700;
      font-size: 1rem;
    }
    .med-qty {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--color-primary);
      line-height: 1;
      margin: var(--spacing-xs) 0;
    }
    .med-qty.low { color: var(--color-danger); }
    .med-qty.warning { color: var(--color-warning); }

    /* Autocomplete */
    .autocomplete-wrapper {
      position: relative;
    }
    .autocomplete-list {
      position: absolute;
      top: calc(100% + 2px);
      left: 0;
      right: 0;
      background: var(--color-surface);
      border: 1.5px solid var(--color-primary);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      z-index: 200;
      max-height: 220px;
      overflow-y: auto;
    }
    .autocomplete-item {
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.15s;
    }
    .autocomplete-item:hover,
    .autocomplete-item.highlighted {
      background: #e8f0fe;
      color: var(--color-primary);
    }
    .autocomplete-item.disabled {
      color: var(--color-text-muted);
      cursor: default;
    }
    .autocomplete-item small {
      color: var(--color-text-muted);
      margin-left: 6px;
    }

    .alert-strip {
      background: #f8d7da;
      color: #721c24;
      border-left: 4px solid var(--color-danger);
      border-radius: var(--radius);
      padding: var(--spacing-sm) var(--spacing-md);
      margin-bottom: var(--spacing-sm);
      font-size: 0.9rem;
    }
    .alerts-section {
      margin-bottom: var(--spacing-md);
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <span class="navbar__brand">FieldScreen AI</span>
    <ul class="navbar__links">
      <li><a href="map.html">Carte</a></li>
      <li><a href="upload.html">Ordonnance</a></li>
      <li><a href="stock.html" class="active">Médicaments</a></li>
      <li><a href="admin.html">Admin</a></li>
      <li><a href="#" id="btn-logout">Déconnexion</a></li>
    </ul>
  </nav>

  <div class="container">
    <div class="page-header"><h1>Suivi des médicaments</h1></div>

    <div id="alert-container"></div>

    <div class="card" style="margin-bottom:var(--spacing-md);">
      <h2 style="font-size:1rem;margin-bottom:var(--spacing-sm);">Déclarer une prise</h2>
      <form id="form-consumption" style="display:flex;gap:var(--spacing-sm);flex-wrap:wrap;align-items:flex-end;">

        <div class="form-group" style="flex:2;min-width:200px;margin-bottom:0;">
          <label for="med-search">Médicament pris</label>
          <div class="autocomplete-wrapper">
            <input
              class="form-control"
              type="text"
              id="med-search"
              placeholder="Tapez un nom (ex: Metf…)"
              autocomplete="off"
              required
            />
            <div class="autocomplete-list" id="med-suggestions" style="display:none;"></div>
          </div>
          <input type="hidden" id="consume-med-id" />
        </div>

        <div class="form-group" style="flex:0 0 130px;margin-bottom:0;">
          <label for="consumption-qty">Doses consommées</label>
          <input class="form-control" type="number" id="consumption-qty" min="1" value="1" required />
        </div>

        <button type="submit" class="btn btn--primary">Enregistrer la prise</button>
      </form>
    </div>

    <div class="alerts-section" id="alerts-section" style="display:none;"></div>

    <div class="med-grid" id="med-grid">
      <p style="color:var(--color-text-muted);font-size:0.9rem;">Chargement…</p>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script type="module" src="../js/stock.js"></script>
</body>
</html>
